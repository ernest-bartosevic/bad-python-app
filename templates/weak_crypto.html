{% extends "base.html" %}
{% block content %}

<section class="section">
  <h1 class="title">Weak Cryptography - MD5 Password Hashing</h1>

  <div class="block">
    <p>Enter a password to hash it with MD5 — a broken algorithm unsuitable for password storage.</p>
  </div>

  <div class="block">
    <form action="/weak-crypto" method="get" style="max-width: 400px;">
      <div class="field">
        <label class="label">Password</label>
        <div class="control">
          <input class="input" name="password" type="text" placeholder="password123" value="{{ password }}">
        </div>
      </div>
      <div class="field">
        <div class="control">
          <button class="button is-link">Hash</button>
        </div>
      </div>
    </form>
  </div>

  {% if hashed %}
  <div class="block">
    <p><strong>MD5 hash:</strong> <code>{{ hashed }}</code></p>
  </div>
  {% endif %}
</section>

{% endblock %}
