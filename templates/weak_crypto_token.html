{% extends "base.html" %}
{% block content %}

<section class="section">
  <h1 class="title">Weak Crypto - MD5 Token Generation</h1>

  <div class="block">
    <p>Generates a session token by MD5-hashing the username and current timestamp.</p>
  </div>

  <div class="block">
    <form action="/weak-crypto/token" method="get" style="max-width: 300px;">
      <div class="field">
        <label class="label">Username</label>
        <div class="control">
          <input class="input" name="username" type="text" placeholder="e.g. admin" value="{{ username }}">
        </div>
      </div>
      <div class="field">
        <div class="control">
          <button class="button is-link">Generate Token</button>
        </div>
      </div>
    </form>
  </div>

  {% if token %}
  <div class="block">
    <p><strong>Token:</strong> <code>{{ token }}</code></p>
  </div>
  {% endif %}
</section>

{% endblock %}
